<header class="site-header">
  <div class="shell header-inner">
    <div class="brand-block">
      <a class="brand-mark" href="/" aria-label="На главную">
        <span class="brand-sigil" aria-hidden="true">//</span>
        <span>{{ site.title }}</span>
      </a>
      <p class="brand-copy">{{ site.description }}</p>
    </div>

    <button class="nav-toggle" type="button" aria-label="Открыть меню" aria-controls="site-nav" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="site-nav" id="site-nav" aria-label="Основная навигация">
      {{ slot.header_nav }}
    </nav>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Переключить тему">
      <span class="theme-toggle-dot" aria-hidden="true"></span>
      <span data-theme-label>Night</span>
    </button>
  </div>
</header>
