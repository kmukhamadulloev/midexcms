<!DOCTYPE html>
<html lang="en" data-admin-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ dashboard_theme_asset_base }}/admin.css">
</head>
<body class="admin-body admin-auth-body">
    <div class="admin-backdrop" aria-hidden="true">
        <span class="backdrop-orb orb-a"></span>
        <span class="backdrop-orb orb-b"></span>
        <span class="backdrop-orb orb-c"></span>
    </div>
    <canvas class="admin-particles" data-admin-particles aria-hidden="true"></canvas>
    <main class="auth-shell">
        <section class="auth-stage">
            <div class="auth-copy">
                <p class="page-kicker">MidexCMS</p>
                <h1 class="auth-hero-title">A modern admin for content, media, and site settings.</h1>
                <p class="auth-hero-copy">Manage pages, switch themes, and work in light or dark mode with a cleaner Material-style interface.</p>
            </div>
            <div class="auth-panel">
                {{ flash_html }}
                {{ content }}
            </div>
        </section>
    </main>
    <script src="{{ dashboard_theme_asset_base }}/admin.js"></script>
</body>
</html>
